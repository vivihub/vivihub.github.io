<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>未明シアター — 逃 / 幽霊から逃げろ</title>
<style>
  :root{--ink:#06080d;--dawn1:#0a0e16;--dawn2:#111a27;--blood:#b8202a;--glow:#cdb557;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#000;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;overflow:hidden;
    -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}

  #scene{position:fixed;inset:0;overflow:hidden;
    background:radial-gradient(130% 100% at 50% 30%, var(--dawn2) 0%, var(--dawn1) 45%, var(--ink) 80%, #03050a 100%);}
  #arena{position:absolute;inset:0}

  .fog{position:absolute;inset:-20% -30%;pointer-events:none;mix-blend-mode:screen;opacity:.45}
  .fog::before{content:"";position:absolute;inset:0;
    background:radial-gradient(40% 30% at 30% 60%, rgba(60,90,110,.20), transparent 60%),
              radial-gradient(50% 35% at 75% 70%, rgba(40,70,90,.16), transparent 60%);filter:blur(8px)}
  .fog1{animation:fogA 46s linear infinite}.fog2{animation:fogB 63s linear infinite;opacity:.3}
  @keyframes fogA{0%,100%{transform:translateX(-6%)}50%{transform:translateX(6%)}}
  @keyframes fogB{0%,100%{transform:translateX(7%)}50%{transform:translateX(-7%)}}

  .decor{position:absolute;bottom:0;pointer-events:none;opacity:.16;filter:blur(.4px)}

  /* player */
  #player{position:absolute;left:0;top:0;width:0;height:0;will-change:transform;z-index:30}
  #pImgWrap{position:absolute;transform:translate(-50%,-86%)}
  #pImg{height:120px;width:auto;display:block;
    filter:drop-shadow(0 8px 10px rgba(0,0,0,.6)) contrast(1.05)}
  #pImgWrap.walk #pInner{animation:pbob .42s linear infinite}
  @keyframes pbob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-7px) rotate(2deg)}}
  #pShadow{position:absolute;left:50%;bottom:-2px;width:64px;height:16px;transform:translateX(-50%);
    background:radial-gradient(closest-side,rgba(0,0,0,.6),transparent 70%);filter:blur(2px)}

  /* ghosts */
  .ghost{position:absolute;left:0;top:0;width:72px;height:86px;transform:translate(-50%,-50%);
    will-change:transform;z-index:20;filter:drop-shadow(0 0 14px rgba(150,200,255,.35))}
  .ghost .gfloat{animation:gfloat 2.6s ease-in-out infinite}
  @keyframes gfloat{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-7px) scaleY(.96)}}
  .ghost .pupil{animation:gflick 2.2s steps(1) infinite}
  @keyframes gflick{0%,92%{opacity:.9}94%,100%{opacity:.15}}

  /* ofuda */
  .fuda{position:absolute;left:0;top:0;width:26px;height:38px;transform:translate(-50%,-50%) rotate(-6deg);
    background:linear-gradient(#efe9d8,#d9cfae);border:1px solid #b8a874;z-index:15;
    box-shadow:0 0 16px rgba(205,181,87,.55);animation:fudaPulse 1.6s ease-in-out infinite}
  .fuda::before{content:"";position:absolute;left:50%;top:5px;bottom:5px;width:3px;transform:translateX(-50%);
    background:repeating-linear-gradient(#7a1418 0 4px, transparent 4px 8px)}
  @keyframes fudaPulse{0%,100%{box-shadow:0 0 12px rgba(205,181,87,.4);transform:translate(-50%,-50%) rotate(-6deg) scale(1)}
    50%{box-shadow:0 0 22px rgba(205,181,87,.75);transform:translate(-50%,-52%) rotate(-6deg) scale(1.08)}}

  .pulse{position:absolute;border:2px solid rgba(205,181,87,.8);border-radius:50%;pointer-events:none;
    transform:translate(-50%,-50%);z-index:25;animation:pulseExp .6s ease-out forwards}
  @keyframes pulseExp{from{width:20px;height:20px;opacity:.9}to{width:520px;height:520px;opacity:0}}

  .vignette{position:absolute;inset:0;pointer-events:none;z-index:40;
    background:radial-gradient(120% 90% at 50% 45%, transparent 48%, rgba(0,0,0,.62) 100%)}
  #danger{position:absolute;inset:0;pointer-events:none;z-index:41;opacity:0;
    box-shadow:inset 0 0 200px 40px rgba(184,32,42,.55);transition:opacity .15s}

  /* HUD */
  #hud{position:absolute;top:14px;left:0;right:0;z-index:50;display:flex;justify-content:center;gap:26px;
    color:#e7ecf2;letter-spacing:.12em;font-size:15px;text-shadow:0 2px 8px rgba(0,0,0,.8)}
  #hud b{color:var(--glow);font-size:19px}
  .topbtn{position:absolute;top:12px;right:12px;z-index:50;display:flex;gap:8px}
  .topbtn button{font-family:inherit;font-size:13px;color:#dfe4ea;background:rgba(20,28,40,.55);
    border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(6px);padding:6px 11px;border-radius:999px;cursor:pointer}
  .topbtn button:active{transform:scale(.95)}

  /* D-pad */
  #dpad{position:absolute;bottom:24px;left:24px;z-index:55;width:168px;height:168px;display:grid;
    grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:6px}
  #dpad button{font-family:inherit;font-size:26px;color:#e7ecf2;background:rgba(20,28,40,.6);
    border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(6px);border-radius:14px;cursor:pointer;
    display:grid;place-items:center;touch-action:none}
  #dpad button:active{background:rgba(205,181,87,.4);transform:scale(.94)}
  .du{grid-area:1/2}.dl{grid-area:2/1}.dr{grid-area:2/3}.dd{grid-area:3/2}
  #dpad .mid{grid-area:2/2;background:transparent;border:none;pointer-events:none}

  /* screens */
  .screen{position:absolute;inset:0;z-index:60;display:grid;place-items:center;text-align:center;
    background:radial-gradient(circle at 50% 40%, rgba(8,10,16,.7), rgba(3,4,8,.94));color:#e7ecf2;
    backdrop-filter:blur(3px)}
  .screen.hide{display:none}
  .screen h1{font-size:clamp(34px,9vw,72px);letter-spacing:.18em;margin-bottom:6px;
    text-shadow:0 0 28px rgba(184,32,42,.5)}
  .screen .sub{letter-spacing:.5em;opacity:.8;margin-bottom:30px;font-size:clamp(13px,2.6vw,17px);padding-left:.5em}
  .screen p{opacity:.78;line-height:2;font-size:14px;margin-bottom:26px}
  .bigbtn{font-family:inherit;font-size:18px;letter-spacing:.16em;color:#0a0d14;background:var(--glow);
    border:none;padding:14px 40px;border-radius:999px;cursor:pointer;box-shadow:0 0 26px rgba(205,181,87,.5)}
  .bigbtn:active{transform:scale(.96)}
  #over h1{color:var(--blood);animation:flicker 2.4s infinite}
  @keyframes flicker{0%,100%{opacity:1}48%{opacity:1}50%{opacity:.55}52%{opacity:1}71%{opacity:.7}73%{opacity:1}}
  .scoreline{font-size:20px;letter-spacing:.1em;margin-bottom:6px}
  .scoreline b{color:var(--glow);font-size:30px}
  .best{opacity:.7;margin-bottom:26px;letter-spacing:.1em}
  #scene.shake{animation:shk .4s linear}
  @keyframes shk{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,3px)}
    40%{transform:translate(6px,-4px)}60%{transform:translate(-4px,-2px)}80%{transform:translate(4px,2px)}}
</style>
</head>
<body>
<div id="scene">
  <div class="fog fog1"></div><div class="fog fog2"></div>
  <div id="arena"></div>
  <div class="vignette"></div>
  <div id="danger"></div>

  <div id="hud"><span>おふだ <b id="hScore">0</b></span><span>生存 <b id="hTime">0</b>s</span></div>
  <div class="topbtn"><button id="btnAudio">🔊 音</button><button id="btnPause">⏸</button></div>

  <div id="dpad">
    <button class="du" data-dir="up">▲</button>
    <button class="dl" data-dir="left">◀</button>
    <div class="mid"></div>
    <button class="dr" data-dir="right">▶</button>
    <button class="dd" data-dir="down">▼</button>
  </div>

  <div class="screen" id="start">
    <div>
      <h1>逃</h1>
      <div class="sub">未明シアター</div>
      <p>夜明け前。新聞をまとった君を、幽霊が追ってくる。<br>
         十字キー（←↑↓→ / WASD）で逃げろ。<br>
         光る「おふだ」を拾うと、近くの霊を祓える。</p>
      <button class="bigbtn" id="btnStart">は じ め る</button>
    </div>
  </div>

  <div class="screen hide" id="over">
    <div>
      <h1>つかまった</h1>
      <div class="scoreline">おふだ <b id="finalScore">0</b> ／ 生存 <span id="finalTime">0</span>s</div>
      <div class="best">最高記録：おふだ <span id="bestScore">0</span></div>
      <button class="bigbtn" id="btnRetry">も う い ち ど</button>
    </div>
  </div>
</div>

const arena=document.getElementById('arena'), scene=document.getElementById('scene');
const hScore=document.getElementById('hScore'), hTime=document.getElementById('hTime');
const danger=document.getElementById('danger');
const startScreen=document.getElementById('start'), overScreen=document.getElementById('over');

let W=innerWidth,H=innerHeight;
addEventListener('resize',()=>{W=innerWidth;H=innerHeight});

/* ---------- audio (web audio, no files) ---------- */
let actx=null, muted=false, masterGain=null;
function initAudio(){ if(actx)return; actx=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=actx.createGain(); masterGain.gain.value=.5; masterGain.connect(actx.destination); }
function thump(freq=55,dur=.18,vol=.6){ if(!actx||muted)return;
  const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=freq;
  g.gain.setValueAtTime(0,actx.currentTime);g.gain.linearRampToValueAtTime(vol,actx.currentTime+.01);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+dur+.02);}
function heartbeat(){ if(!playing){return;} const near=nearestGhostDist();
  const t=Math.max(.30,Math.min(1.15, near/520));   // closer = faster
  if(!muted){ thump(58,.16,.55); setTimeout(()=>thump(46,.20,.5),140); }
  hbTimer=setTimeout(heartbeat, t*1000); }
function blip(){ if(!actx||muted)return; const o=actx.createOscillator(),g=actx.createGain();
  o.type='triangle';o.frequency.setValueAtTime(880,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1660,actx.currentTime+.12);
  g.gain.setValueAtTime(.35,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.18);
  o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+.2);}
function scareSound(){ if(!actx||muted)return;
  const o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';
  o.frequency.setValueAtTime(420,actx.currentTime);o.frequency.exponentialRampToValueAtTime(40,actx.currentTime+.7);
  g.gain.setValueAtTime(.5,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.8);
  o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+.85);
  // noise burst
  const bs=actx.createBufferSource(),buf=actx.createBuffer(1,actx.sampleRate*.3,actx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  bs.buffer=buf;const ng=actx.createGain();ng.gain.value=.4;bs.connect(ng);ng.connect(masterGain);bs.start();}

/* ---------- entities ---------- */
let player, ghosts=[], fudas=[], playing=false, paused=false;
let score=0, startT=0, lastSpawn=0, ghostSpeedBase=1.7, raf=0, hbTimer=0;
let best=0;
const input={up:false,down:false,left:false,right:false};

function makeGhostSVG(){
  return `<div class="gfloat"><svg viewBox="0 0 100 120" width="72" height="86" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="gg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#eef6ff" stop-opacity=".95"/>
      <stop offset="55%" stop-color="#bcd3e6" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#7d97ad" stop-opacity=".35"/></radialGradient></defs>
    <path d="M50 8 C22 8 16 38 16 68 L16 104 C16 111 23 108 27 101 C31 95 35 111 41 104 C46 98 48 112 50 104 C52 112 55 98 60 104 C66 111 70 95 74 101 C78 108 85 111 85 104 L85 68 C85 38 78 8 50 8 Z" fill="url(#gg)"/>
    <ellipse cx="38" cy="54" rx="7.5" ry="12" fill="#070710"/>
    <ellipse cx="62" cy="54" rx="7.5" ry="12" fill="#070710"/>
    <circle class="pupil" cx="38" cy="58" r="2.6" fill="#c8202a"/>
    <circle class="pupil" cx="62" cy="58" r="2.6" fill="#c8202a"/>
    <ellipse cx="50" cy="84" rx="7" ry="11" fill="#070710" opacity=".85"/>
  </svg></div>`;
}

function spawnPlayer(){
  player={x:W/2,y:H/2,face:1,moving:false,el:document.createElement('div')};
  player.el.id='player';
  player.el.innerHTML=`<div id="pImgWrap"><div id="pInner"><img id="pImg" src="${CHAR_SRC}" draggable="false">
    <div id="pShadow"></div></div></div>`;
  arena.appendChild(player.el);
  player.wrap=player.el.querySelector('#pImgWrap');
  player.inner=player.el.querySelector('#pImgWrap');
}
function spawnGhost(){
  // spawn at edge away from player
  let x,y,tries=0;
  do{ const side=Math.floor(Math.random()*4);
    if(side===0){x=Math.random()*W;y=-40}
    else if(side===1){x=Math.random()*W;y=H+40}
    else if(side===2){x=-40;y=Math.random()*H}
    else{x=W+40;y=Math.random()*H}
    tries++;
  }while(Math.hypot(x-player.x,y-player.y)<260 && tries<8);
  const el=document.createElement('div');el.className='ghost';el.innerHTML=makeGhostSVG();
  el.style.animationDelay=(-Math.random()*2)+'s';
  arena.appendChild(el);
  ghosts.push({x,y,vx:0,vy:0,el,wob:Math.random()*6.28});
}
function spawnFuda(){
  const m=70;const x=m+Math.random()*(W-2*m), y=m+40+Math.random()*(H-2*m-120);
  const el=document.createElement('div');el.className='fuda';arena.appendChild(el);
  fudas.push({x,y,el});
}
function nearestGhostDist(){let d=9999;for(const g of ghosts){const dd=Math.hypot(g.x-player.x,g.y-player.y);if(dd<d)d=dd;}return d;}

function clearArena(){arena.innerHTML='';ghosts=[];fudas=[];}

function startGame(){
  initAudio();
  clearArena();
  score=0; ghostSpeedBase=1.7; startT=performance.now(); lastSpawn=startT;
  hScore.textContent=0; hTime.textContent=0;
  spawnPlayer();
  for(let i=0;i<2;i++)spawnGhost();
  for(let i=0;i<3;i++)spawnFuda();
  playing=true; paused=false;
  startScreen.classList.add('hide'); overScreen.classList.add('hide');
  clearTimeout(hbTimer); heartbeat();
  cancelAnimationFrame(raf); last=performance.now(); loop(last);
}

function repel(cx,cy){
  const el=document.createElement('div');el.className='pulse';el.style.left=cx+'px';el.style.top=cy+'px';
  arena.appendChild(el);setTimeout(()=>el.remove(),650);
  for(const g of ghosts){const dx=g.x-cx,dy=g.y-cy,d=Math.hypot(dx,dy)||1;
    if(d<300){const f=(1-d/300)*22; g.x+=dx/d*f*6; g.y+=dy/d*f*6; g.push=18*(1-d/300);}}
}

let last=0;
function loop(now){
  raf=requestAnimationFrame(loop);
  if(!playing||paused){last=now;return;}
  const dt=Math.min(40,(now-last)); last=now;
  const t=(now-startT)/1000;
  hTime.textContent=Math.floor(t);

  // difficulty ramp
  ghostSpeedBase=1.7+t*0.018;
  const cap=Math.min(9,2+Math.floor(t/13));
  if(now-lastSpawn>13000 && ghosts.length<cap){spawnGhost();lastSpawn=now;}

  // player move
  let vx=(input.right?1:0)-(input.left?1:0);
  let vy=(input.down?1:0)-(input.up?1:0);
  const moving=(vx||vy);
  if(moving){const n=Math.hypot(vx,vy);vx/=n;vy/=n;
    const sp=3.3*(dt/16.7); player.x+=vx*sp; player.y+=vy*sp;
    if(vx<-0.1)player.face=-1; else if(vx>0.1)player.face=1;}
  player.x=Math.max(40,Math.min(W-40,player.x));
  player.y=Math.max(90,Math.min(H-20,player.y));
  player.el.style.transform=`translate(${player.x}px,${player.y}px)`;
  player.wrap.style.transform=`translate(-50%,-86%) scaleX(${player.face})`;
  player.wrap.classList.toggle('walk',!!moving);

  // ghosts chase
  for(const g of ghosts){
    g.wob+=0.05;
    let dx=player.x-g.x, dy=player.y-g.y; const d=Math.hypot(dx,dy)||1;
    let sp=ghostSpeedBase*(dt/16.7);
    if(g.push&&g.push>0){sp=-sp*1.4;g.push-=dt/40;}     // briefly flee after repel
    // wobble perpendicular for organic motion
    const px=-dy/d, py=dx/d, wob=Math.sin(g.wob)*0.9;
    g.x+=(dx/d+px*wob)*sp; g.y+=(dy/d+py*wob)*sp;
    g.el.style.transform=`translate(${g.x}px,${g.y}px) translate(-50%,-50%)`;
    // collision
    if(d<48 && (!g.push||g.push<=0)){ return gameOver(g); }
  }

  // fuda pickup
  for(let i=fudas.length-1;i>=0;i--){const f=fudas[i];
    f.el.style.transform=`translate(${f.x}px,${f.y}px) translate(-50%,-50%) rotate(-6deg)`;
    if(Math.hypot(f.x-player.x,f.y-player.y)<46){
      f.el.remove();fudas.splice(i,1);score++;hScore.textContent=score;blip();
      repel(player.x,player.y); spawnFuda();
    }}

  // danger vignette by proximity
  const near=nearestGhostDist();
  danger.style.opacity=near<240?(1-near/240)*0.9:0;
}

function gameOver(g){
  playing=false; clearTimeout(hbTimer);
  scareSound();
  // ghost lunges to player
  if(g){g.el.style.transition='transform .18s ease-in';
    g.el.style.transform=`translate(${player.x}px,${player.y}px) translate(-50%,-50%) scale(2.4)`;}
  danger.style.opacity=.95; scene.classList.add('shake');
  setTimeout(()=>scene.classList.remove('shake'),420);
  best=Math.max(best,score);
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalTime').textContent=Math.floor((performance.now()-startT)/1000);
  document.getElementById('bestScore').textContent=best;
  setTimeout(()=>{overScreen.classList.remove('hide');danger.style.opacity=0;},700);
}

/* ---------- input ---------- */
const keymap={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
  w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right'};
addEventListener('keydown',e=>{const k=keymap[e.key];if(k){input[k]=true;e.preventDefault();}});
addEventListener('keyup',e=>{const k=keymap[e.key];if(k){input[k]=false;e.preventDefault();}});

document.querySelectorAll('#dpad button[data-dir]').forEach(b=>{
  const dir=b.dataset.dir;
  const on=e=>{e.preventDefault();input[dir]=true;};
  const off=e=>{e.preventDefault();input[dir]=false;};
  b.addEventListener('pointerdown',on);
  b.addEventListener('pointerup',off);
  b.addEventListener('pointerleave',off);
  b.addEventListener('pointercancel',off);
});

document.getElementById('btnStart').onclick=startGame;
document.getElementById('btnRetry').onclick=startGame;

const btnPause=document.getElementById('btnPause');
btnPause.onclick=()=>{if(!playing)return;paused=!paused;btnPause.textContent=paused?'▶':'⏸';
  if(!paused){last=performance.now();heartbeat();}else clearTimeout(hbTimer);};

const btnAudio=document.getElementById('btnAudio');
btnAudio.onclick=()=>{muted=!muted;btnAudio.textContent=muted?'🔇 音':'🔊 音';};
</script>
